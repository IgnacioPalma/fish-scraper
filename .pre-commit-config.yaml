# Ganchos de pre-commit: linting y formateo con ruff.
# Instalar una vez con:  uv run pre-commit install
# (o `pipx run pre-commit install`). Corren sobre los archivos en el commit.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
