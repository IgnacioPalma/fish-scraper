name: refresh-ifop

# Corre los scrapers IFOP + registro en la nube y cachea su porción del corpus
# crudo en R2. Se dispara a mano; el corpus histórico es estático, así que se
# corre rara vez. Cada job baja su porción de raw/ desde R2 antes de scrapear
# (reanuda por checkpoint) y vuelve a subirla al terminar.
#
# El registro va acá (no en su propio workflow) porque depende de IFOP: el scrape
# por RPA de artes (fishing_types) necesita vessels.csv, que se deriva del crudo IFOP.
#
# Copernicus y VMS tienen sus propios workflows: refresh-copernicus.yml y
# vms-refresh.yml. Los tres escriben claves R2 disjuntas, así que pueden correr en
# paralelo.
on:
  workflow_dispatch:

# Evita dos refrescos IFOP simultáneos pisándose sobre R2.
concurrency:
  group: refresh-ifop
  cancel-in-progress: false

env:
  # Alcance geográfico del scraping: variable de repo `REGION` (Settings → Variables),
  # por defecto `atacama`. Sin esto, active_region() no ve el REGION del .env local
  # (gitignorado, no llega a CI) y siempre resuelve a atacama.
  REGION: ${{ vars.REGION || 'atacama' }}
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  ifop:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # bajo el tope de 6 h; el scraper reanuda por checkpoint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run playwright install --with-deps chromium
      - name: Traer IFOP crudo existente (reanuda checkpoint)
        run: scripts/r2_pull.sh ifop
      - name: Scrapear SIEM IFOP
        run: uv run python -m processing.ifop.scraper.scrape_siem
      - name: Subir IFOP crudo a R2
        if: always()  # sube el checkpoint parcial aunque el job se corte
        run: scripts/r2_push.sh ifop

  registry:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: ifop  # el scrape por RPA (fishing_types) necesita vessels.csv de IFOP
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Traer IFOP crudo + registro existente
        run: scripts/r2_pull.sh ifop registry
      - name: Derivar vessels.csv de IFOP (sin re-scrapear)
        run: uv run python -m processing.ifop.run_pipeline --skip-scrape
      - name: Scrapear registro nacional + artes (fishing_types)
        run: uv run python -m processing.registry.run_pipeline
      - name: Subir registro crudo a R2
        if: always()
        run: scripts/r2_push.sh registry
