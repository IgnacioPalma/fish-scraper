name: pipeline

# Procesa el corpus crudo cacheado en R2 y publica el dataset de modelado.
# NO scrapea ni descarga: baja raw/ desde R2, corre run_all con
# --skip-scrape --skip-download (solo cómputo, sin navegador) y sube output/.
# Requiere que refresh-raw haya poblado R2 antes.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # lunes 06:00 UTC — chequeo de reproducibilidad semanal

concurrency:
  group: pipeline
  cancel-in-progress: true

env:
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Traer corpus crudo desde R2
        run: scripts/r2_pull.sh raw
      - name: Procesar (run_all --skip-scrape --skip-download)
        run: uv run python -m processing.run_all --skip-scrape --skip-download
      - name: Subir productos a R2
        run: scripts/r2_push.sh output
      - name: Publicar productos como artifact
        uses: actions/upload-artifact@v4
        with:
          name: zarpes-atacama-output
          path: data/output/
          if-no-files-found: error
      - name: Resumen
        if: always()
        run: |
          {
            echo "## Pipeline histórico"
            echo ""
            if [ -f data/output/zarpes_atacama_haul_env.csv ]; then
              n=$(($(wc -l < data/output/zarpes_atacama_haul_env.csv) - 1))
              echo "- Dataset de modelado: **${n} filas** en \`data/output/zarpes_atacama_haul_env.csv\`"
              echo "- Publicado en R2: \`s3://${R2_BUCKET}/output/\`"
            else
              echo "- ⚠️ No se generó \`zarpes_atacama_haul_env.csv\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
