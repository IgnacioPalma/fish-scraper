name: pipeline

# Procesa el corpus crudo cacheado en R2 y publica los datasets de modelado.
# NO scrapea ni descarga: baja raw/ desde R2, corre run_all con
# --skip-scrape --skip-download (solo cómputo, sin navegador) y sube output/.
# run_all produce UN dataset por fuente de captura (SOURCE): `bitacora`
# (zarpes_<region>_haul_env.csv) y `backup` (zarpes_<region>_backup_haul_env.csv).
# El pull `raw` trae ambos crudos (bitacora.csv + backup.csv) desde el mismo
# prefijo `capture/input`, así que basta con haber subido backup.csv una vez
# (scripts/r2_push.sh capture).
# Requiere que refresh-ifop, refresh-copernicus y vms-refresh hayan poblado R2 antes.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # lunes 06:00 UTC — chequeo de reproducibilidad semanal

concurrency:
  group: pipeline
  cancel-in-progress: true

env:
  # Alcance geográfico del pipeline: variable de repo `REGION` (Settings → Variables),
  # por defecto `atacama`. Sin esto, active_region() no ve el REGION del .env local
  # (gitignorado, no llega a CI) y siempre resuelve a atacama.
  REGION: ${{ vars.REGION || 'atacama' }}
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Traer corpus crudo desde R2
        run: scripts/r2_pull.sh raw
      - name: Procesar (run_all --skip-scrape --skip-download)
        run: uv run python -m processing.run_all --skip-scrape --skip-download
      - name: Subir productos a R2
        run: scripts/r2_push.sh output
      - name: Publicar productos como artifact
        uses: actions/upload-artifact@v4
        with:
          name: zarpes-${{ env.REGION }}-output
          path: data/output/
          if-no-files-found: error
      - name: Resumen
        if: always()
        run: |
          {
            echo "## Pipeline histórico"
            echo ""
            echo "- Región (\`REGION\`): \`${REGION}\`"
            echo "- Publicado en R2: \`s3://${R2_BUCKET}/output/${REGION}/\`"
            echo ""
            for src in bitacora backup; do
              suffix=""; [ "$src" = "backup" ] && suffix="_backup"
              out="data/output/zarpes_${REGION}${suffix}_haul_env.csv"
              if [ -f "$out" ]; then
                n=$(($(wc -l < "$out") - 1))
                echo "- Fuente \`${src}\`: **${n} filas** en \`${out}\`"
              else
                echo "- ⚠️ Fuente \`${src}\`: no se generó \`${out}\`."
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"
