# Configuración común a todos los servicios (build, volumen de datos, credenciales)
x-base: &base
  build: .
  env_file: .env
  environment:
    # Sin búfer en stdout/stderr: los `print()` aparecen al instante en
    # `docker compose run` en vez de quedar atrapados hasta que llene el
    # búfer (o nunca, si el script termina por error).
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./data:/app/data

services:
  # Descarga SST. Uso: `docker compose run --rm download_sst`
  download_sst:
    <<: *base
    command: ["python", "-m", "processing.copernicus.download_sst"]

  # Descarga clorofila-a. Uso: `docker compose run --rm download_chl`
  download_chl:
    <<: *base
    command: ["python", "-m", "processing.copernicus.download_chl"]

  # Descarga variables físicas (MLD, SSS, thetao_400m) del producto
  # GLOBAL_MULTIYEAR_PHY_001_030. Uso: `docker compose run --rm download_phy`
  download_phy:
    <<: *base
    command: ["python", "-m", "processing.copernicus.download_phy"]

  # Descarga biogeoquímica (O₂ mínimo 0–200 m, zooc, phyc, nppv) del
  # producto GLOBAL_MULTIYEAR_BGC_001_029.
  # Uso: `docker compose run --rm download_bgc`
  download_bgc:
    <<: *base
    command: ["python", "-m", "processing.copernicus.download_bgc"]

  # Descarga altimetría (sla, adt, ugos, vgos) del producto
  # SEALEVEL_GLO_PHY_L4_MY_008_047.
  # Uso: `docker compose run --rm download_sla`
  download_sla:
    <<: *base
    command: ["python", "-m", "processing.copernicus.download_sla"]

  # Descarga vientos a 10 m (eastward_wind, northward_wind) del producto
  # WIND_GLO_PHY_L4_MY_012_006. El script agrega el viento horario a media
  # diaria antes de regrillar. Uso: `docker compose run --rm download_wind`
  download_wind:
    <<: *base
    command: ["python", "-m", "processing.copernicus.download_wind"]

  # Descarga los reportes diarios VMS de Sernapesca para la flota artesanal
  # (código 31) desde 2019-03-03 a hoy, un CSV por día en data/locations/.
  # Es idempotente: las fechas ya descargadas se saltan. Cubrir el rango
  # completo puede tardar horas (formato antiguo Drupal requiere iterar
  # múltiples timestamps por fecha). Uso: `docker compose run --rm download_locations`
  download_locations:
    <<: *base
    command: ["python", "-m", "processing.locations.download_locations"]

  # Conveniencia: ejecuta los seis descargadores en secuencia.
  # Uso: `docker compose run --rm download_all`
  # Nota: el `&&` corta a la primera falla; los descargadores siguientes
  # no corren. Es intencional — preferimos detenernos y revisar antes
  # de seguir descargando.
  download_all:
    <<: *base
    command:
      - "sh"
      - "-c"
      - >-
        python -m processing.copernicus.download_sst &&
        python -m processing.copernicus.download_chl &&
        python -m processing.copernicus.download_phy &&
        python -m processing.copernicus.download_bgc &&
        python -m processing.copernicus.download_sla &&
        python -m processing.copernicus.download_wind

  # Preprocesa data/register.csv: deja sólo categoría LANCHA y conserva la
  # inscripción más reciente por (Nº Matrícula, Puerto). Genera
  # data/register_clean.csv. Uso: `docker compose run --rm clean_register`
  clean_register:
    <<: *base
    command: ["python", "-m", "processing.register.clean_register"]

  # Servidor Jupyter para análisis posterior. Uso: `docker compose up jupyter`
  # Nota: el token está deshabilitado a propósito porque el puerto solo se publica
  # en localhost; si se expone a la red conviene reactivarlo.
  jupyter:
    <<: *base
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
    ports:
      - "127.0.0.1:8888:8888"
